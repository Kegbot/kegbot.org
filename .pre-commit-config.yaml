repos:
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.6.1
    hooks:
    - id: biome-check
      additional_dependencies: ["@biomejs/biome@2.4.7"]
  - repo: local
    hooks:
    - id: typecheck
      name: typecheck
      entry: bun run typecheck
      language: system
      pass_filenames: false
      types_or: [ts, tsx]
